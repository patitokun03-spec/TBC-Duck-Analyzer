<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7P3JK2357E"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-7P3JK2357E');
    </script>
    <script>var whTooltips = {colorLinks: true, iconizeLinks: false, renameLinks: true, domain: 'tbc', hide: {icon: true}};</script>
    <script src="https://wow.zamimg.com/widgets/power.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="TBC Duck Analyzer - Professional tool to analyze World of Warcraft TBC logs. Check performance, buffs, enchants and more.">
    <meta name="keywords" content="WoW, TBC, Burning Crusade, analyzer, warcraft logs, audit">
    <meta name="author" content="TBC Duck Analyzer">
    <meta property="og:title" content="TBC Duck Analyzer - WoW TBC Log Analyzer">
    <meta property="og:description" content="Detailed analysis of World of Warcraft TBC combat logs">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#f4b400">
    <title>TBC Duck Analyzer - WoW TBC Log Analyzer</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" type="image/x-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-family='Arial'>🦆</text></svg>">
</head>

<body>

    <div id="feedbackBtn" class="feedback-btn" title="Report a bug or suggestion">
        📝 Feedback
    </div>

    <div id="githubBtn" class="github-btn" title="Go to GitHub repository">
        ⭐ GitHub
    </div>



    <!-- MODAL DE EQUIPO (PAPERDOLL) -->
    <div class="overlay" id="gearOverlay">
        <div class="settings-modal paperdoll-card" style="width: 1000px; max-width: 95vw;">
            <div class="settings-header">
                <h3 id="gearModalTitle">👕 Gear Inspector</h3>
                <button class="close-btn" onclick="closeGearModal()">×</button>
            </div>
            <div class="settings-body gear-modal-body" style="padding: 1.5rem; background: #0a0a0a;">
                <div id="gearModalContent"></div>
            </div>
        </div>
    </div>

    <!-- MODAL DISCORD -->
    <div class="overlay" id="discordOverlay">
        <div class="settings-modal" style="width: 400px; max-width: 95vw;">
            <div class="settings-header">
                <h3>💬 Discord Webhook</h3>
                <button class="close-btn" onclick="document.getElementById('discordOverlay').classList.remove('is-open')">×</button>
            </div>
            <div class="settings-body" style="padding: 1.5rem;">
                <div class="input-group">
                    <label>Webhook URL</label>
                    <input type="text" id="discordWebhookInput" placeholder="https://discord.com/api/webhooks/...">
                </div>
            </div>
            <div class="settings-footer" style="display: flex; gap: 10px; flex-direction: row; justify-content: space-between;">
                <button class="close-btn" style="flex: 1; padding: 10px; background: #333; color: white; border-radius: 6px; font-size: 1rem; border: none; cursor: pointer;" onclick="document.getElementById('discordOverlay').classList.remove('is-open')">Cancel</button>
                <button class="save-btn" style="flex: 1; background: #5865F2; padding: 10px; border-radius: 6px; font-size: 1rem; border: none; cursor: pointer;" onclick="procesarDiscordWebhook()">Save & Send</button>
            </div>
        </div>
    </div>

    <div class="container">


        <div class="logo-container">
            <h1>TBC DUCK ANALYZER</h1>
        </div>

        <div class="top-bar">
            <input type="text" id="logId" placeholder="Paste log URL or ID here..." autocomplete="off"
                spellcheck="false" data-lpignore="true">
            <button onclick="auditarLog()" class="audit-btn">LOG CHECK</button>
            <button id="btnDiscord" onclick="enviarADiscord()"
                style="display:none; background:#5865F2; margin-left:10px; color:white;">SEND TO DISCORD</button>
        </div>

        <div id="encounterTabs" class="encounter-tabs"></div>

        <div id="resultados"></div>
    </div>

    <script src="/js/data.js"></script>
    <script src="/js/script.js"></script>
    <script>
        // GitHub Feedback System
        document.getElementById('feedbackBtn').addEventListener('click', function () {
            const gitHubIssueUrl = 'https://github.com/patitokun03-spec/TBC-Duck-Analyzer/issues/new?labels=feedback&template=bug_report.md';
            window.open(gitHubIssueUrl, '_blank');
        });

        // GitHub Repository Button
        document.getElementById('githubBtn').addEventListener('click', function () {
            window.open('https://github.com/patitokun03-spec/TBC-Duck-Analyzer', '_blank');
        });


    </script>

    <!-- Removed duplicate script tags -->

    <footer class="app-footer">
        <div class="footer-content">
            <p>TBC Duck Analyzer v1.1 © 2026 | <a href="https://github.com/patitokun03-spec/TBC-Duck-Analyzer"
                    target="_blank">Open Source on GitHub</a></p>
            <p style="font-size: 0.85rem; color: #888;">WoW TBC Log Analyzer | Made for the community</p>
        </div>
    </footer>
</body>

</html>
